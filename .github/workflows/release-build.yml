# Builds the two store-ready, signed release artifacts and uploads them as
# workflow artifacts — no store upload happens here (that's a manual download +
# upload for now, or a follow-up workflow with store API credentials):
#   - Android: .aab signed with the Play upload keystore (materialized from secrets;
#     see keystore.properties.example)
#   - iOS: .ipa signed with the Apple Distribution cert + "CouchGames App Store"
#     profile (project.yml pins manual signing with exactly these), plus the dSYMs
#
# Runs on bare-semver release tags and on demand. Each signing step fails fast with
# a named error when its secrets are missing — the Android build would otherwise
# silently fall back to a debug-signed (store-rejected) artifact.
name: Release build

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
    # TEMP while iterating on this workflow — workflow_dispatch only works once
    # the file is on the default branch. Remove before merging to main.
    branches: [ci/release-build]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Materialize upload keystore from secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            [ -n "${!v}" ] || { echo "::error::Secret $v is not set"; exit 1; }
          done
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build signed release bundle
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Verify the AAB is signed with the upload key
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          keytool -printcert -jarfile "$AAB"
          # Belt and suspenders on top of the fail-fast above: the Gradle script
          # debug-signs release builds whenever keystore.properties is unusable.
          if keytool -printcert -jarfile "$AAB" | grep -q "CN=Android Debug"; then
            echo "::error::AAB is debug-signed — upload keystore was not applied"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: com.couchgames.controller-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  ios:
    name: iOS (IPA)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Select latest Xcode 26
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Install xcodegen
        run: |
          # The runner image ships an untrusted aws/tap that brew warns about on
          # every invocation — drop it, we only need core.
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Import distribution certificate and provisioning profile
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          for v in IOS_DIST_CERT_P12_BASE64 IOS_DIST_CERT_PASSWORD IOS_PROVISIONING_PROFILE_BASE64; do
            [ -n "${!v}" ] || { echo "::error::Secret $v is not set"; exit 1; }
          done

          # Throwaway keychain so nothing touches the runner's login keychain.
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign
          # Let codesign use the imported key without a UI prompt (headless runner).
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Profiles must be UUID-named; cover the classic dir and the Xcode 16+ one.
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          UUID="$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract UUID raw -o - -)"
          for dir in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                     "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$dir"
            cp "$RUNNER_TEMP/profile.mobileprovision" "$dir/$UUID.mobileprovision"
          done

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -project CouchGames.xcodeproj \
            -scheme CouchGames \
            -destination "generic/platform=iOS" \
            -archivePath build/CouchGames.xcarchive

      - name: Export signed IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/CouchGames.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export
          ls -la build/export

      - uses: actions/upload-artifact@v7
        with:
          name: com.couch-games.controller-release-ipa
          path: ios/build/export/*.ipa
          if-no-files-found: error

      # Keep the debug symbols with the build — needed to symbolicate crash
      # reports for exactly this binary.
      - uses: actions/upload-artifact@v7
        with:
          name: com.couch-games.controller-release-dsyms
          path: ios/build/CouchGames.xcarchive/dSYMs
          if-no-files-found: error
