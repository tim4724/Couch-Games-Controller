<?xml version="1.0" encoding="UTF-8"?>
<!-- Phone-pad glyph, same path data as the Android adaptive icon
     (res/drawable/ic_launcher_foreground.xml). Icon layers render at 1 SVG
     unit = 1 canvas point (centered, no fit-scaling), so the canvas is
     authored at 1024 and the group transform maps the Android 108-unit space
     onto it — controller body spans the same ~64% of the tile as the legacy
     1024px PNG. Controls are even-odd holes so the alpha also serves as the
     monochrome (tinted) layer. -->
