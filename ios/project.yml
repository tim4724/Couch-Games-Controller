name: CouchGames
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
targets:
  CouchGames:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CouchGames
        excludes:
          - "Resources"
      - path: CouchGames/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.couch-games.controller
        PRODUCT_NAME: CouchGames
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5ZH48MPAM3 # survives xcodegen regeneration; Xcode-pane picks don't
      configs:
        # Release (the Archive config) signs MANUALLY with the App Store
        # distribution profile. This team has no registered devices, so automatic
        # signing can't mint the development profile it insists on — but an App
        # Store distribution profile needs none. Debug stays automatic (simulator
        # builds don't sign, so CI is unaffected). The profile is bound to the
        # explicit App ID com.couch-games.controller carrying Associated Domains;
        # set that up in the portal, not here. Xcode-pane signing picks don't
        # survive `xcodegen generate` — these do.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "CouchGames App Store"
    # Universal Links. Each host serves /.well-known/apple-app-site-association;
    # hexstacker.com scopes to the 6-char room code, couch-games.com adds the
    # legal pages (/privacy, /imprint, EN + default). The AASA room pattern is a
    # single exactly-6-char path segment — marketing pages fall through to the
    # browser, and JoinResolver rejects any 6-char non-room code at runtime.
    # This file is generated from the properties below (like the .xcodeproj) and
    # is gitignored; edit the list here, not the plist. Associated Domains must
    # also be enabled on the App ID in the Developer portal.
    entitlements:
      path: CouchGames/CouchGames.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:hexstacker.com
          - applinks:couch-games.com
    scheme:
      testTargets:
        - CouchGamesUITests
    info:
      path: CouchGames/Info.plist
      properties:
        CFBundleDisplayName: Couch Games
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        # ATS: permit cleartext only to local, non-routable hosts (localhost, *.local,
        # RFC-1918 private IPv4 ranges) so a controller served off a dev machine on the
        # LAN can load over http. Public hosts keep full ATS. This exception is inert in
        # release: JoinResolver and the WebView navigation gate only ever produce an http
        # LAN navigation under #if DEBUG, so a release build never exercises it.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: "Couch Games uses the camera to scan the room QR code shown on your TV."
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
  # Smoke test + store-screenshot capture (see StoreScreenshotTests.swift).
  CouchGamesUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CouchGamesUITests
    dependencies:
      - target: CouchGames
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.couch-games.controller.uitests
        SWIFT_VERSION: "5.10"
        TEST_TARGET_NAME: CouchGames
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
